{% extends "base.html" %}
{% block content %}

<section class="success-page">

  <div class="success-icon">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#E1F5EE"/>
      <path d="M17 28.5L24 35.5L39 20" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>You're all set!</h1>
  <p>Your payment was successful and your subscription is now active.</p>
  <p class="note">You'll receive a confirmation email from Razorpay shortly.</p>

  <div class="actions">
    <a href="{{ url_for('jobs') }}" class="btn btn-primary">Go to jobs</a>
  </div>

</section>

<style>
  .success-page {
    max-width: 480px;
    margin: 80px auto;
    text-align: center;
    padding: 0 24px;
  }
  .success-icon { margin-bottom: 24px; }
  .success-page h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .success-page p {
    color: #6b7280;
    margin-bottom: 8px;
    line-height: 1.6;
  }
  .success-page .note {
    font-size: 13px;
    margin-bottom: 32px;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>

{% endblock %}
